---
- summary: |
    Не работает фильтрация товаров по категории
  environment: |
    Браузер: Google Chrome 134.0.6998.178 (Официальная сборка) (64 бит)
    Операционная система: Windows 11
    Тестируемое приложение: [укажите ссылку на приложение]
  steps-to-reproduce: |
    1. Открыть главную страницу каталога интернет-магазина
    2. В блоке фильтров выбрать любую категорию товаров (например, "Электроника")
    3. Нажать на выбранную категорию
  expected-result: |
    В каталоге должны отображаться только товары, относящиеся к выбранной категории. Остальные товары должны скрываться.
  actual-result: |
    Фильтрация не происходит. Каталог продолжает показывать все товары без изменений. При этом никаких сообщений об ошибке не появляется. В консоли DevTools ошибок не обнаружено.

- summary: |
    Не работает оформление заказа — отсутствует переход на страницу оплаты
  environment: |
    Браузер: Google Chrome 134.0.6998.178 (Официальная сборка) (64 бит)
    Операционная система: Windows 11
    Тестируемое приложение: [укажите ссылку на приложение]
  steps-to-reproduce: |
    1. Добавить любой товар в корзину, нажав кнопку "В корзину" на карточке товара
    2. Перейти в корзину (нажать на иконку корзины)
    3. Нажать кнопку "Оформить заказ"
  expected-result: |
    Должен произойти переход на страницу оплаты (checkout/payment). Должна открыться форма для ввода платёжных данных и адреса доставки.
  actual-result: |
    Кнопка "Оформить заказ" не реагирует на нажатие. Переход на страницу оплаты не происходит. Пользователь остаётся на странице корзины. В консоли DevTools обнаружена ошибка: "Uncaught TypeError: Cannot read properties of undefined"
