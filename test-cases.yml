---
- summary: |
    Успешное добавление товара в корзину с главной страницы каталога
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта главная страница каталога. В корзине нет товаров. Пользователь не авторизован.
  test-data: |
    Любой товар из каталога, например "Ноутбук XYZ", цена 50000 руб.
  steps:
    - Нажать кнопку "В корзину" на карточке товара
  expected-result: |
    Появляется уведомление "Товар добавлен в корзину". Иконка корзины обновляется, показывая количество товаров (1). При открытии корзины в ней отображается добавленный товар.

- summary: |
    Просмотр подробной информации о товаре
  requirement: |
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: |
    Открыта главная страница каталога
  test-data: |
    Любой товар из каталога
  steps:
    - Нажать на название или изображение товара
  expected-result: |
    Открывается страница товара с подробной информацией: название, рейтинг, цена со скидкой и без скидки, полное описание, кнопка "В корзину".

- summary: |
    Фильтрация товаров по категории
  requirement: |
    Пользователь должен иметь возможность фильтровать товары
  prerequisites: |
    Открыта страница каталога. В каталоге есть товары из разных категорий (например, "Электроника" и "Одежда").
  test-data: |
    Выбрать категорию "Электроника"
  steps:
    - Выбрать категорию "Электроника" в фильтре
  expected-result: |
    В каталоге отображаются только товары из категории "Электроника". Товары из категории "Одежда" не отображаются.

- summary: |
    Удаление товара из корзины
  requirement: |
    Пользователь должен иметь возможность удалить товар из корзины
  prerequisites: |
    В корзине есть хотя бы один товар. Открыта страница корзины.
  test-data: |
    Товар "Ноутбук XYZ" в корзине
  steps:
    - Нажать кнопку "Удалить" рядом с товаром
  expected-result: |
    Товар исчезает из списка в корзине. Общая сумма корзины пересчитывается. Появляется сообщение "Товар удалён". Иконка корзины обновляется.

- summary: |
    Поиск товара по ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову или категории
  prerequisites: |
    Открыта страница каталога
  test-data: |
    Ключевое слово "ноутбук". В каталоге есть товары, содержащие это слово в названии или описании.
  steps:
    - Ввести в поле поиска "ноутбук"
    - Нажать кнопку "Найти" или клавишу Enter
  expected-result: |
    В каталоге отображаются только товары, содержащие слово "ноутбук" в названии или описании.

- summary: |
    Адаптивная вёрстка на мобильном устройстве
  requirement: |
    Сайт должен иметь адаптивную вёрстку для удобства на мобильных устройствах
  prerequisites: |
    Открыт сайт на мобильном устройстве или в эмуляторе мобильного устройства (ширина экрана менее 768px)
  test-data: |
    Страница каталога
  steps:
    - Уменьшить ширину окна браузера до 375px (iPhone SE)
    - Пролистать страницу вниз и вверх
    - Нажать на кнопки фильтрации и корзины
  expected-result: |
    Все элементы страницы отображаются корректно, не выходят за границы экрана. Текст читаемый. Кнопки удобны для нажатия пальцем. Меню сворачивается в бургер-меню (если предусмотрено).

- summary: |
    Оформление заказа и переход на страницу оплаты
  requirement: |
    Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  prerequisites: |
    В корзине есть хотя бы один товар. Открыта страница корзины.
  test-data: |
    Товар "Ноутбук XYZ" в корзине, общая сумма 50000 руб.
  steps:
    - Нажать кнопку "Оформить заказ"
  expected-result: |
    Происходит переход на страницу оплаты. URL страницы содержит "/payment" или "/checkout". Страница оплаты отображает сумму заказа и форму для ввода платёжных данных.

- summary: |
    Отображение цены со скидкой и без скидки
  requirement: |
    На странице товара и в каталоге должны отображаться название, рейтинг, цена со скидкой и без скидки
  prerequisites: |
    Открыта страница каталога. В каталоге есть товар со скидкой.
  test-data: |
    Товар "Ноутбук XYZ": старая цена 60000 руб., скидка 20%, новая цена 48000 руб.
  steps:
    - Найти товар со скидкой в каталоге
    - Открыть страницу этого товара
  expected-result: |
    В каталоге отображается старая цена (60000 руб.) и новая цена со скидкой (48000 руб.). На странице товара также отображаются обе цены. Старая цена перечёркнута.

- summary: |
    Постраничный вывод товаров
  requirement: |
    Сайт должен иметь постраничный вывод товаров в каталоге
  prerequisites: |
    В каталоге более 10 товаров (или больше настроенного лимита на страницу). Открыта страница каталога.
  test-data: |
    В каталоге 25 товаров, на странице отображается по 10 товаров
  steps:
    - Пролистать каталог до конца страницы
    - Нажать кнопку "Далее" или номер страницы "2"
  expected-result: |
    Отображаются следующие 10 товаров. Кнопка "Предыдущая" становится активной (или появляется). Номер текущей страницы визуально выделен.

- summary: |
    Сохранение корзины после перезагрузки страницы
  requirement: |
    Корзина должна храниться в сессии браузера
  prerequisites: |
    В корзину добавлен хотя бы один товар
  test-data: |
    Товар "Ноутбук XYZ" в корзине
  steps:
    - Добавить товар в корзину
    - Перезагрузить страницу (F5 или Ctrl+R)
    - Открыть корзину
  expected-result: |
    Товар "Ноутбук XYZ" остаётся в корзине. Количество товаров не изменилось.
