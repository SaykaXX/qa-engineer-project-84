---
functional:
  - Пользователь должен иметь возможность просматривать каталог товаров
  - Пользователь должен иметь возможность просматривать подробную информацию о товаре
  - На странице товара и в каталоге должны отображаться название, рейтинг, цена со скидкой и без скидки
  - Пользователь должен иметь возможность фильтровать товары
  - Пользователь должен иметь возможность искать товары по ключевому слову или категории
  - Пользователь должен иметь возможность добавлять товары в корзину
  - Пользователь должен иметь возможность просматривать содержимое корзины
  - Пользователь должен иметь возможность удалить товар из корзины
  - Пользователь должен иметь возможность продолжить выбор товаров после добавления в корзину
  - Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  - Корзина должна храниться в сессии браузера
  - Сайт должен быть SPA-приложением
  - Сайт должен иметь постраничный вывод товаров в каталоге

non-functional:
  - Сайт должен быть разработан с учетом удобства использования
  - Сайт должен быть оптимизирован для скорости работы
  - Сайт должен быть безопасным и защищать данные пользователя
  - Сайт должен иметь адаптивную вёрстку для удобства на мобильных устройствах
  - Сайт должен быть доступен на различных устройствах
  - Сайт должен быть протестирован на совместимость с последними версиями браузеров
  - Сайт должен обрабатывать большое количество трафика
  - Сайт должен иметь мобильную версию

implicit:
  - Сайт должен корректно отображаться на различных разрешениях экрана
  - При добавлении товара в корзину пользователь должен получать визуальное подтверждение
  - Сайт должен корректно обрабатывать ситуацию, когда товар закончился на складе
  - Корзина должна показывать общую сумму заказа с учётом скидок
  - Пользователь должен иметь возможность изменить количество товара в корзине
  - Пустые состояния каталога и корзины должны обрабатываться с понятным сообщением
